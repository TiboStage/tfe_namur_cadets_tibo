# SCÉNART — Messages Flash (FR)
# Messages de toasts : connexion, validation, erreurs

flash:
    # Connexion / Déconnexion
    auth:
        welcome: "Bienvenue {firstName} !"
        welcome_back: "Bon retour {firstName} !"
        logout: "À bientôt !"
        logout_success: "Vous êtes maintenant déconnecté"

    # Validation formulaires
    validation:
        error: "Veuillez corriger les erreurs avant de soumettre"
        required_fields: "Tous les champs obligatoires doivent être remplis"
        invalid_email: "L'adresse email n'est pas valide"
        password_mismatch: "Les mots de passe ne correspondent pas"

    # Succès génériques
    success:
        saved: "Enregistré avec succès !"
        created: "Créé avec succès !"
        updated: "Modifié avec succès !"
        deleted: "Supprimé avec succès !"

    # Erreurs génériques
    error:
        generic: "Une erreur est survenue"
        not_found: "Élément introuvable"
        access_denied: "Accès refusé"
        server_error: "Erreur serveur, veuillez réessayer"

    # Warnings
    warning:
        unsaved_changes: "Modifications non enregistrées"
        confirm_delete: "Êtes-vous sûr de vouloir supprimer ?"

    # Info
    info:
        loading: "Chargement en cours..."
        processing: "Traitement en cours..."
        saved_draft: "Brouillon enregistré automatiquement"
