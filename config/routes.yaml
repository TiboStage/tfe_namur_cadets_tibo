# config/routes.yaml

# 1. REDIRECTION DE LA RACINE
root_redirect:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: app_home
        _locale: fr
        permanent: false

# 2. ROUTES AVEC URLS TRADUITES
app_home:
    path:
        fr: /{_locale}/accueil
        en: /{_locale}/home
    controller: App\Controller\Website\PagesController::index
    requirements:
        _locale: en|fr

app_examples:
    path:
        fr: /{_locale}/exemples
        en: /{_locale}/examples
    controller: App\Controller\Website\PagesController::examples
    requirements:
        _locale: en|fr

app_pricing:
    path:
        fr: /{_locale}/tarifs
        en: /{_locale}/pricing
    controller: App\Controller\Website\PagesController::pricing
    requirements:
        _locale: en|fr

app_features:
    path:
        fr: /{_locale}/fonctionnalites
        en: /{_locale}/features
    controller: App\Controller\Website\PagesController::features
    requirements:
        _locale: en|fr

app_contact:
    path:
        fr: /{_locale}/contact
        en: /{_locale}/contact
    controller: App\Controller\Website\PagesController::contact
    requirements:
        _locale: en|fr


# Workshop — URLs traduites

app_workshop_dashboard:
    path:
        fr: /{_locale}/atelier
        en: /{_locale}/workshop
    controller: App\Controller\Workshop\DashboardController::index
    requirements:
        _locale: en|fr

app_project_index:
    path:
        fr: /{_locale}/atelier/projets
        en: /{_locale}/workshop/projects
    controller: App\Controller\Workshop\ProjectController::index
    requirements:
        _locale: en|fr

app_project_new:
    path:
        fr: /{_locale}/atelier/projets/nouveau
        en: /{_locale}/workshop/projects/new
    controller: App\Controller\Workshop\ProjectController::new
    requirements:
        _locale: en|fr

app_project_show:
    path:
        fr: /{_locale}/atelier/projets/{slug}
        en: /{_locale}/workshop/projects/{slug}
    controller: App\Controller\Workshop\ProjectController::show
    requirements:
        _locale: en|fr
        id: \d+

app_project_edit:
    path:
        fr: /{_locale}/atelier/projets/{slug}/modifier
        en: /{_locale}/workshop/projects/{slug}/edit
    controller: App\Controller\Workshop\ProjectController::edit
    requirements:
        _locale: en|fr
        id: \d+

app_project_delete:
    path:
        fr: /{_locale}/atelier/projets/{slug}/supprimer
        en: /{_locale}/workshop/projects/{slug}/delete
    controller: App\Controller\Workshop\ProjectController::delete
    requirements:
        _locale: en|fr
        id: \d+
    methods: [POST]

app_profile:
    path:
        fr: /{_locale}/profil
        en: /{_locale}/profile
    controller: App\Controller\Website\ProfileController::show
    requirements:
        _locale: en|fr

app_character_index:
    path:
        fr: /{_locale}/atelier/projets/{project_id}/personnages
        en: /{_locale}/workshop/projects/{project_id}/characters
    controller: App\Controller\Workshop\CharacterController::index
    requirements:
        _locale: en|fr
        project_id: \d+

app_character_new:
    path:
        fr: /{_locale}/atelier/projets/{project_id}/personnages/nouveau
        en: /{_locale}/workshop/projects/{project_id}/characters/new
    controller: App\Controller\Workshop\CharacterController::new
    requirements:
        _locale: en|fr
        project_id: \d+

app_character_show:
    path:
        fr: /{_locale}/atelier/projets/{project_id}/personnages/{id}
        en: /{_locale}/workshop/projects/{project_id}/characters/{id}
    controller: App\Controller\Workshop\CharacterController::show
    requirements:
        _locale: en|fr
        project_id: \d+
        id: \d+

app_character_edit:
    path:
        fr: /{_locale}/atelier/projets/{project_id}/personnages/{id}/modifier
        en: /{_locale}/workshop/projects/{project_id}/characters/{id}/edit
    controller: App\Controller\Workshop\CharacterController::edit
    requirements:
        _locale: en|fr
        project_id: \d+
        id: \d+

app_character_delete:
    path:
        fr: /{_locale}/atelier/projets/{project_id}/personnages/{id}/supprimer
        en: /{_locale}/workshop/projects/{project_id}/characters/{id}/delete
    controller: App\Controller\Workshop\CharacterController::delete
    requirements:
        _locale: en|fr
        project_id: \d+
        id: \d+
    methods: [POST]

