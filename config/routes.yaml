# ═══════════════════════════════════════════════════════════════════
# CHARGEMENT AUTOMATIQUE DU RESTE
# ═══════════════════════════════════════════════════════════════════

controllers:
    resource: ../src/Controller/
    type: attribute
    prefix: '/{_locale}'
    requirements:
        _locale: en|fr
    defaults:
        _locale: fr
