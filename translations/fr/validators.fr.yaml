        subject: 'Ex: Question sur les fonctionnalités'
        message: 'Décrivez votre demande en quelques lignes...'

    firstname:
        not_blank: 'Le prénom est requis.'
        too_short: 'Le prénom doit contenir au moins {{ limit }} caractères.'
        too_long: 'Le prénom ne peut pas dépasser {{ limit }} caractères.'

    lastname:
        not_blank: 'Le nom est requis.'
        too_short: 'Le nom doit contenir au moins {{ limit }} caractères.'
        too_long: 'Le nom ne peut pas dépasser {{ limit }} caractères.'

    email:
        not_blank: "L'adresse email est requise."
        invalid: "L'adresse email n'est pas valide."

    subject:
        not_blank: 'Le sujet est requis.'
        too_short: 'Le sujet doit contenir au moins {{ limit }} caractères.'
        too_long: 'Le sujet ne peut pas dépasser {{ limit }} caractères.'

    message:
        not_blank: 'Le message est requis.'
        too_short: 'Le message doit contenir au moins {{ limit }} caractères.'
        too_long: 'Le message ne peut pas dépasser {{ limit }} caractères.'

    privacy:
        must_agree: 'Vous devez accepter la politique de confidentialité pour continuer.'

    flash:
        success: 'Votre message a été envoyé avec succès ! Nous vous répondrons dans les plus brefs délais.'
