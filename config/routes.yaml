app_manuscript_delete:
    path:
        fr: /{_locale}/atelier/projets/{project_slug}/manuscrit/{id}/supprimer
        en: /{_locale}/workshop/projects/{project_slug}/manuscript/{id}/delete
        nl: /{_locale}/werkplaats/projecten/{project_slug}/manuscript/{id}/verwijderen
