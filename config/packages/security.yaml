security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_ADMIN:       ROLE_USER
        ROLE_SUPER_ADMIN: [ROLE_ADMIN, ROLE_USER]

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\LoginFormAuthenticator
            logout:
                path: app_logout
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
            # ── Protection brute force sur le login ─────────────
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

    access_control:
        # ── Couvre les 3 langues (fr/en/nl) + tous les noms de route ──
        - { path: ^/(fr|en|nl)/(atelier|workshop|werkplaats), roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10

when@prod:
    security:
        access_control:
            - { path: ^/, requires_channel: https }
            - { path: ^/(fr|en|nl)/(atelier|workshop|werkplaats), roles: ROLE_USER }
