# config/routes.yaml

# 1. REDIRECTION DE LA RACINE
root_redirect:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: app_home
        _locale: fr
        permanent: false

# 2. ROUTES AVEC URLS TRADUITES
app_home:
    path:
        fr: /{_locale}/accueil
        en: /{_locale}/home
    controller: App\Controller\Website\PagesController::index
    requirements:
        _locale: en|fr

app_examples:
    path:
        fr: /{_locale}/exemples
        en: /{_locale}/examples
    controller: App\Controller\Website\PagesController::examples
    requirements:
        _locale: en|fr

app_pricing:
    path:
        fr: /{_locale}/tarifs
        en: /{_locale}/pricing
    controller: App\Controller\Website\PagesController::pricing
    requirements:
        _locale: en|fr

app_contact:
    path:
        fr: /{_locale}/contact
        en: /{_locale}/contact
    controller: App\Controller\Website\PagesController::contact
    requirements:
        _locale: en|fr

# ═══════════════════════════════════════════════════════════════════
# WORKSHOP — Projets
# ═══════════════════════════════════════════════════════════════════

app_workshop_dashboard:
    path:
        fr: /{_locale}/atelier
        en: /{_locale}/workshop
    controller: App\Controller\Workshop\DashboardController::index
    requirements:
        _locale: en|fr

app_project_index:
    path:
        fr: /{_locale}/atelier/projets
        en: /{_locale}/workshop/projects
    controller: App\Controller\Workshop\ProjectController::index
    requirements:
        _locale: en|fr

# IMPORTANT : "nouveau" AVANT "{slug}" pour éviter collision
app_project_new:
    path:
        fr: /{_locale}/atelier/projets/nouveau
        en: /{_locale}/workshop/projects/new
    controller: App\Controller\Workshop\ProjectController::new
    requirements:
        _locale: en|fr

# Dashboard projet (page d'accueil du projet avec stats)
app_project_show:
    path:
        fr: /{_locale}/atelier/projets/{slug}
        en: /{_locale}/workshop/projects/{slug}
    controller: App\Controller\Workshop\ProjectController::show
    requirements:
        _locale: en|fr
        slug: '[a-z0-9-]+'

app_project_edit:
    path:
        fr: /{_locale}/atelier/projets/{slug}/parametres
        en: /{_locale}/workshop/projects/{slug}/settings
    controller: App\Controller\Workshop\ProjectController::edit
    requirements:
        _locale: en|fr
        slug: '[a-z0-9-]+'

app_project_delete:
    path:
        fr: /{_locale}/atelier/projets/{slug}/supprimer
        en: /{_locale}/workshop/projects/{slug}/delete
    controller: App\Controller\Workshop\ProjectController::delete
    requirements:
        _locale: en|fr
        slug: '[a-z0-9-]+'
    methods: [POST]

app_profile:
    path:
        fr: /{_locale}/profil
        en: /{_locale}/profile
    controller: App\Controller\Website\ProfileController::show
    requirements:
        _locale: en|fr

# ═══════════════════════════════════════════════════════════════════
# MANUSCRIT (éditeur narratif) — renommé depuis "editeur"
# ═══════════════════════════════════════════════════════════════════

app_manuscript_index:
    path:
        fr: /{_locale}/atelier/projets/{project_slug}/manuscrit
        en: /{_locale}/workshop/projects/{project_slug}/manuscript
    controller: App\Controller\Workshop\ScenarioElementController::index
    requirements:
        _locale: en|fr
        project_slug: '[a-z0-9-]+'

app_manuscript_new:
    path:
        fr: /{_locale}/atelier/projets/{project_slug}/manuscrit/nouveau
        en: /{_locale}/workshop/projects/{project_slug}/manuscript/new
    controller: App\Controller\Workshop\ScenarioElementController::new
    requirements:
        _locale: en|fr
        project_slug: '[a-z0-9-]+'
    methods: [GET, POST]

app_manuscript_show:
    path:
        fr: /{_locale}/atelier/projets/{project_slug}/manuscrit/{id}
        en: /{_locale}/workshop/projects/{project_slug}/manuscript/{id}
    controller: App\Controller\Workshop\ScenarioElementController::show
    requirements:
        _locale: en|fr
        project_slug: '[a-z0-9-]+'
        id: \d+

app_manuscript_save:
    path:
        fr: /{_locale}/atelier/projets/{project_slug}/manuscrit/{id}/sauvegarder
        en: /{_locale}/workshop/projects/{project_slug}/manuscript/{id}/save
    controller: App\Controller\Workshop\ScenarioElementController::save
    requirements:
        _locale: en|fr
        project_slug: '[a-z0-9-]+'
        id: \d+
    methods: [POST]

app_manuscript_delete:
    path:
        fr: /{_locale}/atelier/projets/{project_slug}/manuscrit/{id}/supprimer
        en: /{_locale}/workshop/projects/{project_slug}/manuscript/{id}/delete
    controller: App\Controller\Workshop\ScenarioElementController::delete
    requirements:
        _locale: en|fr
        project_slug: '[a-z0-9-]+'
        id: \d+
    methods: [POST]

