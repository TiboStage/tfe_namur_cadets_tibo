# ===== PROJECTCREATIE FUNNEL =====
project_new:
    # STAP 1: Moduskeuze
    step1:
        title: "Een nieuw project maken"
        subtitle: "Kies je aanmaakmodus"

        mode_simplifie:
            title: "Vereenvoudigde modus"
            badge: "Aanbevolen"
            desc_1: "Snel aanmaken"
            desc_2: "Begeleide configuratie"
            desc_3: "Standaardstructuur"
            button: "Starten in vereenvoudigde modus"

        mode_custom:
            title: "Aangepaste modus"
            badge: "Geavanceerd"
            desc_1: "Volledige controle"
            desc_2: "Functiekeuze"
            desc_3: "Geavanceerde aanpassing"
            button: "Starten in aangepaste modus"

    # STAP 2: Projecttype
    step2:
        title_simplifie: "Welk type project?"
        title_custom: "Projectconfiguratie"
        subtitle: "Deze keuze kan niet worden gewijzigd"

        type:
            film:
                title: "Film"
                subtitle: "Kort of speelfilm"
                desc: "DE DRAMATISCHE BOG"
                structure: "3-niveau structuur: Akte → Sequentie → Scène"
                features_title: "HANDTEKENINGFUNCTIES:"
                feature_1: "De Spanningsthermometer"
                feature_1_desc: "Analyseer uw narratieve intensiteitscurve"
                feature_2: "De Hartslag"
                feature_2_desc: "Type en ritme van elke scène (Actie, Dialoog, Stilte, Expositie)"

            serie:
                title: "Serie"
                subtitle: "Webserie of tv-serie"
                desc: "MULTI-BOG ARCHITECTUUR"
                structure: "4-niveau structuur: Seizoen → Aflevering → Akte → Scène"
                features_title: "HANDTEKENINGFUNCTIES:"
                feature_1: "De Storyline Tracker"
                feature_1_desc: "Volg je verhaallijnen en detecteer vergeten draden"
                feature_2: "De Cliffhanger"
                feature_2_desc: "Spanningsintensiteit aan het einde van een aflevering"

            jeu_video:
                title: "Videogame"
                subtitle: "Narratief indie-spel"
                desc: "DE INTERACTIEVE QUEESTE"
                structure: "4-niveau structuur: Hoofdstuk → Queesttype → Interessepunt → Scène"
                features_title: "HANDTEKENINGFUNCTIES:"
                feature_1: "Het Interactiviteitslabel"
                feature_1_desc: "Inhoudstype: Cinematisch, Dialoogkeuzes, Gameplay"
                feature_2: "De Werkelijkheidsconditioner"
                feature_2_desc: "Narratieve vereisten om scènes te ontgrendelen"

        custom:
            slide1_title: "STAP 1/3: Projecttype"
            slide2_title: "STAP 2/3: Beschikbare functies"
            slide2_subtitle: "Je kunt functies mixen op basis van je behoeften"
            slide3_title: "STAP 3/3: Geavanceerde configuratie"

            structure_title: "NARRATIEVE STRUCTUUR"
            structure_standard: "Standaard (Akte → Sequentie → Scène)"
            structure_custom: "Aangepast (tot 5 niveaus)"
            structure_label_placeholder: "Bijv: Deel, Hoofdstuk, Scène..."
            structure_has_content: "Bevat tekst"
            structure_add_level: "+ Niveau toevoegen (max 5)"

            genres_title: "GENRES (meerdere keuzes)"

        button_back: "← Terug"
        button_next: "Volgende →"
        button_validate: "Bevestigen →"

    # STAP 3: Voltooiing
    step3:
        title: "Voltooiing"
        subtitle: "Laatste details voor aanmaak"

        form:
            title_label: "Projecttitel *"
            title_placeholder: "Bijv: De Schaduwen van Brussel"
            description_label: "Beschrijving / Pitch"
            description_placeholder: "Beschrijf je project in een paar zinnen..."
            genres_label: "Genres (meerdere keuzes)"
            cover_label: "Projectafbeelding"
            cover_help: "(optioneel)"
            cover_button: "Bestand kiezen"

        recap:
            title: "SAMENVATTING"
            mode: "Modus:"
            type: "Type:"
            type_locked: "(kan niet worden gewijzigd)"
            structure: "Structuur:"
            genres: "Genres:"
            features: "Geactiveerde functies:"
            visibility: "Zichtbaarheid:"
            visibility_private: "Privé"

        button_create: "Project maken →"

