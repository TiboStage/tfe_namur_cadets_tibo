# ===== CRÉATION DE PROJET (FUNNEL) =====
project_new:
    # ÉTAPE 1 : Sélection du mode
    step1:
        title: "Créer un nouveau projet"
        subtitle: "Choisissez votre mode de création"

        mode_simplifie:
            title: "Mode Simplifié"
            badge: "Recommandé"
            desc_1: "Création rapide"
            desc_2: "Configuration guidée"
            desc_3: "Structure par défaut"
            button: "Commencer en mode simplifié"

        mode_custom:
            title: "Mode Personnalisé"
            badge: "Avancé"
            desc_1: "Contrôle total"
            desc_2: "Sélection des fonctionnalités"
            desc_3: "Personnalisation avancée"
            button: "Commencer en mode personnalisé"

    # ÉTAPE 2 : Type de projet
    step2:
        title_simplifie: "Quel type de projet ?"
        title_custom: "Configuration du projet"
        subtitle: "Ce choix ne peut pas être modifié"

        # Types de projet
        type:
            film:
                title: "Film"
                subtitle: "Court ou long métrage"
                desc: "L'ARC DRAMATIQUE"
                structure: "Structure 3 niveaux : Acte → Séquence → Scène"
                features_title: "FONCTIONNALITÉS SIGNATURE :"
                feature_1: "Le Thermomètre de Tension"
                feature_1_desc: "Analysez votre courbe d'intensité narrative"
                feature_2: "Le Battement de Cœur"
                feature_2_desc: "Type et rythme de chaque scène (Action, Dialogue, Silence, Exposition)"

            serie:
                title: "Série"
                subtitle: "Web-série ou série TV"
                desc: "L'ARCHITECTURE MULTI-ARCS"
                structure: "Structure 4 niveaux : Saison → Épisode → Acte → Scène"
                features_title: "FONCTIONNALITÉS SIGNATURE :"
                feature_1: "Le Tracker de Storylines"
                feature_1_desc: "Suivez vos intrigues et détectez les fils oubliés"
                feature_2: "Le Cliffhanger"
                feature_2_desc: "Intensité du suspense en fin d'épisode"

            jeu_video:
                title: "Jeu Vidéo"
                subtitle: "Jeu narratif indé"
                desc: "LA QUÊTE INTERACTIVE"
                structure: "Structure 4 niveaux : Chapitre → Type de Quête → Point d'Intérêt → Scène"
                features_title: "FONCTIONNALITÉS SIGNATURE :"
                feature_1: "Le Label d'Interactivité"
                feature_1_desc: "Type de contenu : Cinématique, Choix de dialogue, Gameplay"
                feature_2: "Le Conditionneur de Réalité"
                feature_2_desc: "Prérequis narratifs pour débloquer des scènes"

        # Mode Personnalisé - Slides
        custom:
            slide1_title: "ÉTAPE 1/3 : Type de projet"
            slide2_title: "ÉTAPE 2/3 : Fonctionnalités disponibles"
            slide2_subtitle: "Vous pouvez mixer les fonctionnalités selon vos besoins"
            slide3_title: "ÉTAPE 3/3 : Configuration avancée"

            structure_title: "STRUCTURE NARRATIVE"
            structure_standard: "Standard (Acte → Séquence → Scène)"
            structure_custom: "Personnalisée (jusqu'à 5 niveaux)"
            structure_label_placeholder: "Ex : Partie, Chapitre, Scène..."
            structure_has_content: "Contient du texte"
            structure_add_level: "+ Ajouter un niveau (max 5)"

            genres_title: "GENRES (choix multiples)"

        # Boutons de navigation
        button_back: "← Retour"
        button_next: "Suivant →"
        button_validate: "Valider →"

    # ÉTAPE 3 : Finalisation
    step3:
        title: "Finalisation"
        subtitle: "Derniers détails avant création"

        form:
            title_label: "Titre du projet *"
            title_placeholder: "Ex : Les Ombres de Bruxelles"
            description_label: "Description / Pitch"
            description_placeholder: "Décrivez votre projet en quelques phrases..."
            genres_label: "Genres (choix multiples)"
            cover_label: "Image du projet"
            cover_help: "(optionnel)"
            cover_button: "Choisir un fichier"

        recap:
            title: "RÉCAPITULATIF"
            mode: "Mode :"
            type: "Type :"
            type_locked: "(ne peut pas être modifié)"
            structure: "Structure :"
            genres: "Genres :"
            features: "Fonctionnalités activées :"
            visibility: "Visibilité :"
            visibility_private: "Privé"

        button_create: "Créer le projet →"

    # Genres disponibles
    genres:
        film:
            thriller: "Thriller"
            horror: "Horreur"
            scifi: "Science-Fiction"
            drama: "Drame"
            comedy: "Comédie"
            action: "Action"
            fantasy: "Fantasy"

        serie:
            drama: "Drame"
            comedy: "Comédie"
            thriller: "Thriller"
            scifi: "Science-Fiction"
            fantasy: "Fantasy"
            animation: "Animation"
            romance: "Romance"

        jeu_video:
            rpg: "RPG"
            action: "Action"
            adventure: "Aventure"
            platformer: "Plateforme"
            puzzle: "Puzzle"
            visual_novel: "Visual Novel"
            simulation: "Simulation"

    # Messages d'erreur
    error:
        invalid_data: "Données invalides. Veuillez recommencer."
        missing_title: "Le titre est requis."

