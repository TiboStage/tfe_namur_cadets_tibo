# ============================================================
# SCÉNART - Forms Translations (EN)
# ============================================================
# All form labels, placeholders, help texts
# Character, Location, Project forms
# ============================================================

# ===== CHARACTER FORM =====
character:
    form:
        section_identity: "Identity"
        section_psychology: "Psychology"

        name:
            label: "Display name"
            placeholder: "Ex: Marie Dupont"
            help: "The main name of your character"

        firstname:
            label: "First name"
            placeholder: "Marie"

        lastname:
            label: "Last name"
            placeholder: "Dupont"

        nickname:
            label: "Nickname / Main alias"
            placeholder: "The detective"

        role:
            label: "Narrative role"
            placeholder: "Ex: Protagonist, Antagonist, Mentor..."
            help: "The narrative function of the character"

        description:
            label: "Short description"
            placeholder: "Briefly describe this character..."
            help: "Detailed description of the character"

        biography:
            label: "Biography"
            placeholder: "Their history, their past..."
            help: "The background and psychology of the character"

        goals:
            label: "Goals"
            placeholder: "What do they want to achieve?"

        motivations:
            label: "Motivations"
            placeholder: "Why do they act this way?"

        arc:
            label: "Character arc"
            placeholder: "How do they evolve throughout the story?"

        aliases:
            label: "Aliases"
            placeholder: "Nicknames, pseudonyms, other names..."
            help: 'Comma-separated. Ex: JD, The Boss, Mr. X'

        backstory:
            label: "Backstory"
            placeholder: "Past, motivations, defining events..."
            help: "The background and psychology of the character"

        notes:
            label: "Additional notes"
            placeholder: "Extra details, random ideas..."
            help: "All your notes about this character"

        submit_new: "Create character"
        submit_edit: "Save changes"
        cancel: "Cancel"

# ===== LOCATION FORM =====
location:
    form:
        name:
            label: "Location name"
            placeholder: "Ex: The Blackwood Manor"
            help: "The main name of the location"

        type:
            label: "Location type"
            placeholder: "Ex: Tavern, Manor, Forest, City..."
            help: "The category of the location"

        description:
            label: "Description"
            placeholder: "Describe this location, its atmosphere, its characteristics..."
            help: "Detailed description of the location"

        atmosphere:
            label: "Atmosphere"
            placeholder: "Mood, emotions felt..."
            help: "The atmosphere and mood of the location"

        aliases:
            label: "Aliases"
            placeholder: "Other names, nicknames..."
            help: "Comma-separated. Ex: The Dragon, Marcel's Place"

        notes:
            label: "Additional notes"
            placeholder: "Extra details, random ideas..."
            help: "All your notes about this location"

        submit_new: "Create location"
        submit_edit: "Save changes"
        cancel: "Cancel"

# ===== PROJECT FORM =====
project:
    form:
        title:
            label: "Project title"
            placeholder: "The name of your universe..."

        type:
            label: "Project type"

        description:
            label: "Description"
            placeholder: "Briefly describe your story..."

        submit_create: "Create Universe"
        submit_edit: "Save changes"
        cancel: "Cancel"

# ===== COMMON FORM ELEMENTS =====
common:
    back: "Back"
    create: "Create"
    save: "Save"
    cancel: "Cancel"
    delete: "Delete"
    edit: "Edit"
    submit: "Submit"
    close: "Close"
    confirm: "Confirm"
    required: "Required field"
    optional: "Optional"
