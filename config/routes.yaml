# config/routes.yaml

# 1. REDIRECTION DE LA RACINE
root_redirect:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: app_home
        _locale: fr
        permanent: false

# 2. ROUTES AVEC URLS TRADUITES
app_home:
    path:
        fr: /{_locale}/accueil
        en: /{_locale}/home
        nl: /{_locale}/home
    controller: App\Controller\Website\PagesController::index
    requirements:
        _locale: en|fr|nl

app_examples:
    path:
        fr: /{_locale}/exemples
        en: /{_locale}/examples
        nl: /{_locale}/voorbeelden
    controller: App\Controller\Website\PagesController::examples
    requirements:
        _locale: en|fr|nl

app_pricing:
    path:
        fr: /{_locale}/tarifs
        en: /{_locale}/pricing
        nl: /{_locale}/prijzen
    controller: App\Controller\Website\PagesController::pricing
    requirements:
        _locale: en|fr|nl

app_contact:
    path:
        fr: /{_locale}/contact
        en: /{_locale}/contact
        nl: /{_locale}/contact
    controller: App\Controller\Website\PagesController::contact
    requirements:
        _locale: en|fr|nl

# ═══════════════════════════════════════════════════════════════════
# WORKSHOP — Projets
# ═══════════════════════════════════════════════════════════════════

app_workshop_dashboard:
    path:
        fr: /{_locale}/atelier
        en: /{_locale}/workshop
        nl: /{_locale}/werkplaats
    controller: App\Controller\Workshop\DashboardController::index
    requirements:
        _locale: en|fr|nl

app_project_index:
    path:
        fr: /{_locale}/atelier/projets
        en: /{_locale}/workshop/projects
        nl: /{_locale}/werkplaats/projecten
    controller: App\Controller\Workshop\ProjectController::index
    requirements:
        _locale: en|fr|nl

app_project_new:
    path:
        fr: /{_locale}/atelier/projets/nouveau
        en: /{_locale}/workshop/projects/new
        nl: /{_locale}/werkplaats/projecten/nieuw
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: app_project_new_step1
        permanent: false
    requirements:
        _locale: en|fr|nl

app_project_new_step1:
    path:
        fr: /{_locale}/atelier/projets/nouveau/etape-1
        en: /{_locale}/workshop/projects/new/step-1
        nl: /{_locale}/werkplaats/projecten/nieuw/stap-1
    controller: App\Controller\Workshop\ProjectController::newStep1
    requirements:
        _locale: en|fr|nl
    methods: [GET]

app_project_new_step2:
    path:
        fr: /{_locale}/atelier/projets/nouveau/etape-2
        en: /{_locale}/workshop/projects/new/step-2
        nl: /{_locale}/werkplaats/projecten/nieuw/stap-2
    controller: App\Controller\Workshop\ProjectController::newStep2
    requirements:
        _locale: en|fr|nl
    methods: [GET]

app_project_new_step3:
    path:
        fr: /{_locale}/atelier/projets/nouveau/etape-3
        en: /{_locale}/workshop/projects/new/step-3
        nl: /{_locale}/werkplaats/projecten/nieuw/stap-3
    controller: App\Controller\Workshop\ProjectController::newStep3
    requirements:
        _locale: en|fr|nl
    methods: [GET, POST]

app_project_show:
    path:
        fr: /{_locale}/atelier/projets/{slug}
        en: /{_locale}/workshop/projects/{slug}
        nl: /{_locale}/werkplaats/projecten/{slug}
    controller: App\Controller\Workshop\ProjectController::show
    requirements:
        _locale: en|fr|nl
        slug: '[a-z0-9-]+'

app_project_edit:
    path:
        fr: /{_locale}/atelier/projets/{slug}/parametres
        en: /{_locale}/workshop/projects/{slug}/settings
        nl: /{_locale}/werkplaats/projecten/{slug}/instellingen
    controller: App\Controller\Workshop\ProjectController::edit
    requirements:
        _locale: en|fr|nl
        slug: '[a-z0-9-]+'

app_project_delete:
    path:
        fr: /{_locale}/atelier/projets/{slug}/supprimer
        en: /{_locale}/workshop/projects/{slug}/delete
        nl: /{_locale}/werkplaats/projecten/{slug}/verwijderen
    controller: App\Controller\Workshop\ProjectController::delete
    requirements:
        _locale: en|fr|nl
        slug: '[a-z0-9-]+'
    methods: [POST]

app_profile:
    path:
        fr: /{_locale}/profil
        en: /{_locale}/profile
        nl: /{_locale}/profiel
    controller: App\Controller\Website\ProfileController::show
    requirements:
        _locale: en|fr|nl

