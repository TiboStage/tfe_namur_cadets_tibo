            type: "Type :"
            type_locked: "(ne peut pas être modifié)"
            structure: "Structure :"
            genres: "Genres :"
            features: "Fonctionnalités activées :"
            visibility: "Visibilité :"
            visibility_private: "Privé"
        
        button_create: "Créer le projet →"
    
