when@dev:
    web_profiler:
        toolbar: true
        intercept_redirects: false
#        excluded_ajax_paths: '^/((index|app)\.php/)?_wdt'

    framework:
        profiler:
            collect_serializer_data: true

when@test:
    framework:
        profiler:
            collect: false
            collect_serializer_data: true
