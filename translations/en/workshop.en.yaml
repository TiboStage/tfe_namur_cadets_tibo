# ===== PROJECT CREATION FUNNEL =====
project_new:
    # STEP 1: Mode selection
    step1:
        title: "Create a new project"
        subtitle: "Choose your creation mode"

        mode_simplifie:
            title: "Simplified Mode"
            badge: "Recommended"
            desc_1: "Quick creation"
            desc_2: "Guided configuration"
            desc_3: "Default structure"
            button: "Start in simplified mode"

        mode_custom:
            title: "Custom Mode"
            badge: "Advanced"
            desc_1: "Full control"
            desc_2: "Feature selection"
            desc_3: "Advanced customization"
            button: "Start in custom mode"

    # STEP 2: Project type
    step2:
        title_simplifie: "What type of project?"
        title_custom: "Project configuration"
        subtitle: "This choice cannot be changed"

        # Project types
        type:
            film:
                title: "Film"
                subtitle: "Short or feature film"
                desc: "THE DRAMATIC ARC"
                structure: "3-level structure: Act → Sequence → Scene"
                features_title: "SIGNATURE FEATURES:"
                feature_1: "The Tension Thermometer"
                feature_1_desc: "Analyze your narrative intensity curve"
                feature_2: "The Heartbeat"
                feature_2_desc: "Type and rhythm of each scene (Action, Dialogue, Silence, Exposition)"

            serie:
                title: "Series"
                subtitle: "Web series or TV show"
                desc: "MULTI-ARC ARCHITECTURE"
                structure: "4-level structure: Season → Episode → Act → Scene"
                features_title: "SIGNATURE FEATURES:"
                feature_1: "The Storyline Tracker"
                feature_1_desc: "Track your storylines and detect forgotten threads"
                feature_2: "The Cliffhanger"
                feature_2_desc: "Suspense intensity at episode end"

            jeu_video:
                title: "Video Game"
                subtitle: "Narrative indie game"
                desc: "THE INTERACTIVE QUEST"
                structure: "4-level structure: Chapter → Quest Type → Point of Interest → Scene"
                features_title: "SIGNATURE FEATURES:"
                feature_1: "The Interactivity Label"
                feature_1_desc: "Content type: Cinematic, Dialogue choices, Gameplay"
                feature_2: "The Reality Conditioner"
                feature_2_desc: "Narrative prerequisites to unlock scenes"

        # Custom Mode Slides
        custom:
            slide1_title: "STEP 1/3: Project type"
            slide2_title: "STEP 2/3: Available features"
            slide2_subtitle: "You can mix features according to your needs"
            slide3_title: "STEP 3/3: Advanced configuration"

            structure_title: "NARRATIVE STRUCTURE"
            structure_standard: "Standard (Act → Sequence → Scene)"
            structure_custom: "Custom (up to 5 levels)"
            structure_label_placeholder: "Ex: Part, Chapter, Scene..."
            structure_has_content: "Contains text"
            structure_add_level: "+ Add level (max 5)"

            genres_title: "GENRES (multiple choices)"

        # Navigation buttons
        button_back: "← Back"
        button_next: "Next →"
        button_validate: "Validate →"

    # STEP 3: Finalization
    step3:
        title: "Finalization"
        subtitle: "Last details before creation"

        form:
            title_label: "Project title *"
            title_placeholder: "Ex: The Shadows of Brussels"
            description_label: "Description / Pitch"
            description_placeholder: "Describe your project in a few sentences..."
            genres_label: "Genres (multiple choices)"
            cover_label: "Project image"
            cover_help: "(optional)"
            cover_button: "Choose file"

        recap:
            title: "SUMMARY"
            mode: "Mode:"
            type: "Type:"
            type_locked: "(cannot be changed)"
            structure: "Structure:"
            genres: "Genres:"
            features: "Activated features:"
            visibility: "Visibility:"
            visibility_private: "Private"

        button_create: "Create project →"

    # Available genres
    genres:
        film:
            thriller: "Thriller"
            horror: "Horror"
            scifi: "Sci-Fi"
            drama: "Drama"
            comedy: "Comedy"
            action: "Action"
            fantasy: "Fantasy"

        serie:
            drama: "Drama"
            comedy: "Comedy"
            thriller: "Thriller"
            scifi: "Sci-Fi"
            fantasy: "Fantasy"
            animation: "Animation"
            romance: "Romance"

        jeu_video:
            rpg: "RPG"
            action: "Action"
            adventure: "Adventure"
            platformer: "Platformer"
            puzzle: "Puzzle"
            visual_novel: "Visual Novel"
            simulation: "Simulation"

    # Error messages
    error:
        invalid_data: "Invalid data. Please start over."
        missing_title: "Title is required."

