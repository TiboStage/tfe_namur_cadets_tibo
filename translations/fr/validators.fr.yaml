contact:
    label:
        firstname: 'Prénom'
        lastname: 'Nom'
        email: 'Adresse email'
        subject: 'Sujet'
        message: 'Votre message'
        privacy: "J'accepte la politique de confidentialité"

    placeholder:
        firstname: 'Ex: Marie'
        lastname: 'Ex: Dubois'
