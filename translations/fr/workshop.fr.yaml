                feature_1: "Le Thermomètre de Tension"
                feature_1_desc: "Analysez votre courbe d'intensité narrative"
                feature_2: "Le Battement de Cœur"
                feature_2_desc: "Type et rythme de chaque scène (Action, Dialogue, Silence, Exposition)"
            
            serie:
                title: "Série"
                subtitle: "Web-série ou série TV"
                desc: "L'ARCHITECTURE MULTI-ARCS"
                structure: "Structure 4 niveaux : Saison → Épisode → Acte → Scène"
                features_title: "FONCTIONNALITÉS SIGNATURE :"
                feature_1: "Le Tracker de Storylines"
                feature_1_desc: "Suivez vos intrigues et détectez les fils oubliés"
                feature_2: "Le Cliffhanger"
                feature_2_desc: "Intensité du suspense en fin d'épisode"
            
            jeu_video:
                title: "Jeu Vidéo"
                subtitle: "Jeu narratif indé"
                desc: "LA QUÊTE INTERACTIVE"
                structure: "Structure 4 niveaux : Chapitre → Type de Quête → Point d'Intérêt → Scène"
                features_title: "FONCTIONNALITÉS SIGNATURE :"
                feature_1: "Le Label d'Interactivité"
                feature_1_desc: "Type de contenu : Cinématique, Choix de dialogue, Gameplay"
                feature_2: "Le Conditionneur de Réalité"
                feature_2_desc: "Prérequis narratifs pour débloquer des scènes"
        
        # Mode Personnalisé - Slides
        custom:
            slide1_title: "ÉTAPE 1/3 : Type de projet"
            slide2_title: "ÉTAPE 2/3 : Fonctionnalités disponibles"
            slide2_subtitle: "Vous pouvez mixer les fonctionnalités selon vos besoins"
            slide3_title: "ÉTAPE 3/3 : Configuration avancée"
            
            structure_title: "STRUCTURE NARRATIVE"
            structure_standard: "Standard (Acte → Séquence → Scène)"
            structure_custom: "Personnalisée (jusqu'à 5 niveaux)"
            structure_label_placeholder: "Ex : Partie, Chapitre, Scène..."
            structure_has_content: "Contient du texte"
            structure_add_level: "+ Ajouter un niveau (max 5)"
            
            genres_title: "GENRES (choix multiples)"
        
        # Boutons de navigation
        button_back: "← Retour"
        button_next: "Suivant →"
        button_validate: "Valider →"
    
    # ÉTAPE 3 : Finalisation
    step3:
        title: "Finalisation"
        subtitle: "Derniers détails avant création"
        
        form:
