# config/routes.yaml

# 1. REDIRECTION DE LA RACINE
root_redirect:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: app_home
        _locale: fr
        permanent: false

# 2. ROUTES AVEC URLS TRADUITES
app_home:
    path:
        fr: /{_locale}/accueil
        en: /{_locale}/home
        nl: /{_locale}/home
    controller: App\Controller\Website\PagesController::index
    requirements:
        _locale: en|fr|nl

app_examples:
    path:
        fr: /{_locale}/exemples
        en: /{_locale}/examples
        nl: /{_locale}/voorbeelden
    controller: App\Controller\Website\PagesController::examples
    requirements:
        _locale: en|fr|nl

app_pricing:
    path:
        fr: /{_locale}/tarifs
        en: /{_locale}/pricing
        nl: /{_locale}/prijzen
    controller: App\Controller\Website\PagesController::pricing
    requirements:
        _locale: en|fr|nl

app_contact:
    path:
        fr: /{_locale}/contact
        en: /{_locale}/contact
        nl: /{_locale}/contact
    controller: App\Controller\Website\PagesController::contact
    requirements:
        _locale: en|fr|nl

