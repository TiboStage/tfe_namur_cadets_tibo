# 3. CHARGEMENT AUTOMATIQUE DU RESTE
controllers:
    resource: ../src/Controller/
    type: attribute
    prefix: '/{_locale}'
    requirements:
        _locale: en|fr
    defaults:
        _locale: fr



# Routes ScenarioElement — à ajouter dans config/routes.yaml

app_scenario_index:
    path:
        fr: /{_locale}/atelier/projets/{project_id}/editeur
        en: /{_locale}/workshop/projects/{project_id}/editor
    controller: App\Controller\Workshop\ScenarioElementController::index
    requirements:
        _locale: en|fr
        project_id: \d+

app_scenario_new:
    path:
        fr: /{_locale}/atelier/projets/{project_id}/editeur/nouveau
        en: /{_locale}/workshop/projects/{project_id}/editor/new
    controller: App\Controller\Workshop\ScenarioElementController::new
    requirements:
        _locale: en|fr
        project_id: \d+
    methods: [GET, POST]

app_scenario_show:
    path:
        fr: /{_locale}/atelier/projets/{project_id}/editeur/{id}
        en: /{_locale}/workshop/projects/{project_id}/editor/{id}
    controller: App\Controller\Workshop\ScenarioElementController::show
    requirements:
        _locale: en|fr
        project_id: \d+
        id: \d+

app_scenario_save:
    path:
        fr: /{_locale}/atelier/projets/{project_id}/editeur/{id}/sauvegarder
        en: /{_locale}/workshop/projects/{project_id}/editor/{id}/save
    controller: App\Controller\Workshop\ScenarioElementController::save
    requirements:
        _locale: en|fr
        project_id: \d+
        id: \d+
    methods: [POST]

app_scenario_delete:
    path:
        fr: /{_locale}/atelier/projets/{project_id}/editeur/{id}/supprimer
        en: /{_locale}/workshop/projects/{project_id}/editor/{id}/delete
    controller: App\Controller\Workshop\ScenarioElementController::delete
    requirements:
        _locale: en|fr
        project_id: \d+
        id: \d+
    methods: [POST]
